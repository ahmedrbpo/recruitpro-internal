services:
  api:
    build: .
    ports: ["8080:8080"]
    environment:
      - ConnectionStrings__Default=Host=db;Database=recruitpro;Username=postgres;Password=devpassword
      # Local-dev-only value. Never reuse this for staging/production — use Secrets Manager /
      # environment injection there instead.
      - Jwt__Secret=local-dev-only-secret-do-not-use-in-production-32chars-min
      - Jwt__Issuer=RecruitPro
      - Jwt__Audience=RecruitPro.Client
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: recruitpro
      POSTGRES_PASSWORD: devpassword
    # Mapped to 5433 on the host: 5432 is already taken by the sibling RecruitPro project's db.
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
