name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet restore

      - run: dotnet build --no-restore --configuration Release

      - run: dotnet format --verify-no-changes

      # RecruitPro.Api.IntegrationTests uses Testcontainers.PostgreSql, which needs a Docker
      # daemon — already available on GitHub-hosted ubuntu runners, no extra service block needed.
      - name: Run unit and integration tests
        run: dotnet test --no-build --configuration Release

  # Placeholder: builds and pushes the API image to GHCR on merge to master. The
  # migrate-then-deploy step against the real MonsterASP.NET target still needs to be filled in
  # once hosting credentials exist — do not add fabricated secrets/deploy steps ahead of that.
  build-image:
    needs: build-and-test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
